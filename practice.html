<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self-Study Practice — Giga Khizanishvili</title>
    <meta name="description" content="Practice iOS, Android, Frontend, Backend, and Behavioral interview questions on your own.">
    <meta name="author" content="Giga Khizanishvili">
    <meta name="theme-color" content="#000000">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&family=Inter:wght@300;400;500&family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/core/design-system.css">
    <link rel="stylesheet" href="css/interview/base.css">
    <link rel="stylesheet" href="css/interview/setup.css">
    <link rel="stylesheet" href="css/interview/host.css">
    <link rel="stylesheet" href="css/interview/templates.css">
    <link rel="stylesheet" href="css/interview/responsive.css">
    <script>
    (function(){try{var t=localStorage.getItem('ios-interview-theme');if(t==='light')document.documentElement.classList.add('theme-light');}catch(e){}})();
    </script>
</head>
<body data-host-mode="practice">

<!-- Skip to content link -->
<a href="#host-content" class="skip-link">Skip to content</a>

<!-- Screen reader live region -->
<div id="srAnnounce" class="sr-only" aria-live="assertive" aria-atomic="true"></div>

<!-- Navigation -->
<header class="nav">
    <div class="nav__inner">
        <a href="interview.html" class="nav__back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
            Dashboard
        </a>
        <span class="nav__title" id="hostNavTitle">Self-Study Practice</span>
        <button class="nav__fullscreen" id="btnFullscreen" aria-label="Enter fullscreen (F)">
            <svg class="nav__fullscreen__expand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
            <svg class="nav__fullscreen__collapse" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
        </button>
        <button class="nav__theme-toggle" id="btnTheme" aria-label="Toggle light/dark mode">
            <svg class="nav__theme-icon--dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg class="nav__theme-icon--light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
    </div>
</header>

<!-- Practice setup content -->
<main class="screen is-active" id="host-content">
    <div class="container">
        <div class="setup__header">
            <div class="setup__icon" aria-hidden="true" id="setupIcon">📖</div>
            <h1 class="setup__title" id="setupTitle">Self-Study Practice</h1>
            <p class="setup__subtitle" id="setupSubtitle">Practice interview questions on your own. No time pressure, no interviewer — just you and the questions.</p>
        </div>

        <!-- Templates -->
        <div class="templates__section" data-feature="templates">
            <div class="templates__header">
                <span class="templates__label">Quick Start Templates</span>
                <button class="templates__toggle" id="btnToggleTemplates">Show</button>
            </div>
            <div id="templateBody" style="display:none">
                <div class="templates__grid" id="templateGrid"></div>
            </div>
        </div>

        <!-- Platform selector -->
        <div class="setup__section">
            <p class="setup__label">Platform</p>
            <div class="platform-selector" id="platformSelector" role="radiogroup" aria-label="Platform selection">
                <button class="platform-selector__btn is-active" data-platform="ios" role="radio" aria-checked="true">
                    <span class="platform-selector__icon" aria-hidden="true">🍏</span>
                    <span class="platform-selector__name">iOS / Swift</span>
                </button>
                <button class="platform-selector__btn" data-platform="android" role="radio" aria-checked="false">
                    <span class="platform-selector__icon" aria-hidden="true">🤖</span>
                    <span class="platform-selector__name">Android / Kotlin</span>
                </button>
                <button class="platform-selector__btn" data-platform="frontend" role="radio" aria-checked="false">
                    <span class="platform-selector__icon" aria-hidden="true">🌐</span>
                    <span class="platform-selector__name">Frontend / Web</span>
                </button>
                <button class="platform-selector__btn" data-platform="backend" role="radio" aria-checked="false">
                    <span class="platform-selector__icon" aria-hidden="true">⚙️</span>
                    <span class="platform-selector__name">Backend</span>
                </button>
                <button class="platform-selector__btn" data-platform="behavioral" role="radio" aria-checked="false">
                    <span class="platform-selector__icon" aria-hidden="true">🧠</span>
                    <span class="platform-selector__name">Behavioral</span>
                </button>
            </div>
        </div>

        <!-- Topics fold section -->
        <div class="setup__section">
            <p class="setup__label setup__label--fold" id="btnFoldTopics">
                Topics <span class="setup__label-value" id="topicSummary">All 15 topics</span>
                <svg class="setup__fold-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="6 9 12 15 18 9"/></svg>
            </p>
            <div class="setup__fold-body" id="topicFoldBody">
                <div class="setup__fold-actions">
                    <button class="setup__label-action" id="btnToggleAll">Clear All</button>
                </div>
                <div class="setup__topics" id="topicGrid"></div>
            </div>
        </div>

        <!-- Start button -->
        <div class="setup__start">
            <button class="btn-start" id="btnStart" disabled>
                Start Practice
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
        </div>
        <p class="setup__validation" id="validationHint">Select at least one topic to begin</p>
    </div>
</main>

<!-- Back to Top Button -->
<button class="g-btt" id="gBtt" aria-label="Back to top">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><polyline points="18 15 12 9 6 15"/></svg>
</button>

<!-- Scripts -->
<script src="js/interview/questions/ios.js"></script>
<script src="js/interview/questions/android.js"></script>
<script src="js/interview/questions/frontend.js"></script>
<script src="js/interview/questions/backend.js"></script>
<script src="js/interview/questions/behavioral.js"></script>
<script src="js/shared/fullscreen.js"></script>
<script src="js/shared/theme-toggle.js"></script>
<script src="js/shared/scroll-top.js"></script>
<script src="js/interview/utils.js"></script>
<script src="js/interview/config.js"></script>
<script src="js/interview/features.js"></script>
<script src="js/interview/plan.js"></script>
<script src="js/interview/templates.js"></script>
<script src="js/interview/host.js"></script>

</body>
</html>
